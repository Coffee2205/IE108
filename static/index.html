<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>IE108 — Home</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <div id="nav-container"></div>
    <main class="container">
      <div class="card hero">
        <h1>Đặt sân nhanh — Tìm kèo, tuyển đồng đội</h1>
        <p class="muted">Tìm sân gần bạn, so sánh giá và tạo/tham gia kèo đá bóng.</p>
        <form id="search-form" class="search-row" style="margin-top:16px">
          <input id="q" class="input" placeholder="Tìm sân hoặc khu vực" />
          <select class="select">
            <option>1 giờ</option>
            <option>2 giờ</option>
          </select>
          <button class="btn" type="submit">Tìm</button>
        </form>
      </div>

      <h2 style="margin-top:20px">Gợi ý sân gần đây</h2>
      <div class="card-grid" style="margin-top:12px">
        <div class="venue card">
          <h3>SVĐ Hoàng Mai</h3>
          <div class="muted small">Hà Nội — 5km</div>
          <div style="margin-top:12px" class="flex">
            <div class="badge">5v5</div>
            <div style="flex:1"></div>
            <button class="btn book-btn">Đặt</button>
          </div>
        </div>
        <div class="venue card">
          <h3>Trung tâm thể thao A</h3>
          <div class="muted small">Hà Nội — 7km</div>
          <div style="margin-top:12px" class="flex">
            <div class="badge">7v7</div>
            <div style="flex:1"></div>
            <button class="btn book-btn">Đặt</button>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-container"></div>
    <script src="assets/js/app.js"></script>
  </body>
</html>
