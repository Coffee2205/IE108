<section id="hero" class="hero-section section">
  <div class="container">
    <div class="hero-panel">
      <div class="hero-overlay"></div>
      <div class="hero-content container">
        <div class="hero-grid">
          <div class="hero-copy">
            <div class="hero-kicker"><i class="fa-solid fa-shield-heart"></i> PLAYER platform for football booking</div>
            <h1 class="hero-title">Đặt sân bóng dễ dàng và nhanh chóng <strong>trong vài phút</strong></h1>
            <p class="hero-subtitle">Kết nối đam mê bóng đá, tìm sân trống và ghép trận chỉ trong vài phút</p>
            <div class="hero-actions">
              <button class="btn btn-primary">Đặt sân ngay</button>
              <button class="btn btn-ghost">Tìm đối thủ</button>
            </div>
          </div>

          <div class="quick-booking card">
            <h2 class="quick-booking__title">Quick booking</h2>
            <form id="quick-booking" class="quick-booking__form">
              <select id="area" class="select">
                <option value="Hanoi">Hà Nội</option>
                <option value="HCM">Hồ Chí Minh</option>
                <option value="DaNang">Đà Nẵng</option>
              </select>
              <select id="pitch-type" class="select">
                <option value="5v5">Sân 5v5</option>
                <option value="7v7">Sân 7v7</option>
                <option value="11v11">Sân 11v11</option>
              </select>
              <input id="date" type="date" class="input" />
              <button type="submit" class="btn btn-primary quick-booking__submit">Tìm kiếm</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
