<section id="matchfeed" class="section matchfeed-section">
  <div class="container">
    <div class="section-heading">
      <div>
        <h2 class="section-title">Ghép trận</h2>
        <p class="section-subtitle">Tạo bài đăng, nhận kèo và chat cùng người chơi khác</p>
      </div>
    </div>

    <div class="card feed-compose">
      <textarea id="post-text" class="textarea" placeholder="Tạo bài đăng: bạn cần tuyển mấy người?"></textarea>
      <div class="feed-compose__actions">
        <div class="muted small">Bạn đăng với vai trò PLAYER</div>
        <button id="post-btn" class="btn btn-primary">Đăng bài</button>
      </div>
    </div>

    <div id="feed" class="feed-list"></div>
  </div>
</section>
