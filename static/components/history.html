<section id="history" class="section history-section">
  <div class="container">
    <div class="section-heading">
      <div>
        <h2 class="section-title">Lịch sử đặt sân</h2>
        <p class="section-subtitle">Theo dõi các booking sắp tới, hoàn tất hoặc đã hủy</p>
      </div>
    </div>

    <div class="card history-panel">
      <div class="history-tabs" role="tablist">
        <button class="history-tab is-active" data-tab="upcoming">Upcoming</button>
        <button class="history-tab" data-tab="completed">Completed</button>
        <button class="history-tab" data-tab="cancelled">Cancelled</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>
</section>
