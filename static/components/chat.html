<section id="chat" class="section chat-section">
  <div class="container">
    <div class="section-heading">
      <div>
        <h2 class="section-title">Chat</h2>
        <p class="section-subtitle">Giao diện chat kiểu Messenger/Discord cho ghép trận</p>
      </div>
    </div>

    <div class="card chat-layout">
      <aside class="chat-sidebar">
        <div class="chat-sidebar__title">Conversations</div>
        <ul id="conversations" class="chat-list"></ul>
      </aside>
      <div class="chat-window">
        <div id="chat-window" class="chat-window__messages"></div>
        <div class="chat-composer">
          <input id="chat-input" class="input" placeholder="Gửi tin nhắn..." />
          <button id="chat-send" class="btn btn-primary">Gửi</button>
        </div>
      </div>
    </div>
  </div>
</section>
